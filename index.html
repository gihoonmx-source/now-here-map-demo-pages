<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="대한민국 동 단위 행정구역 경계를 Google Maps 위에 인터랙티브하게 표시하는 데모 페이지" />
  <title>동 단위 행정구역 경계 뷰어 – Now Here</title>
  <link rel="stylesheet" href="style.css?v=1.1.9" />
</head>
<body>

  <div id="map"></div>

  <!-- 데이터 로딩 인디케이터 -->
  <div id="map-loading" role="status" aria-live="polite">
    <span class="spinner" aria-hidden="true"></span>경계 데이터를 불러오는 중…
  </div>

  <!-- 좌측 통합 패널 -->
  <div id="left-panel">

    <div id="panel-header">
      <span id="app-title">Now Here</span>
      <div class="panel-header-right">
        <span id="app-version">v1.1.9</span>
        <button id="panel-collapse" class="panel-collapse-btn" aria-label="패널 접기" title="패널 접기" aria-expanded="true"></button>
      </div>
    </div>

    <!-- 모드 토글 -->
    <div id="mode-toggle">
      <div class="mode-indicator"></div>
      <button class="mode-btn active" data-mode="local"><span class="mode-icon">📍</span> 로컬</button>
      <button class="mode-btn" data-mode="trend"><span class="mode-icon">⬡</span> 트렌드</button>
    </div>

    <p id="info-text">폴리곤을 클릭하면 해당 동이 하이라이트됩니다.</p>

    <!-- 트렌드 존 저장 -->
    <div id="zone-save-area" style="display:none;">
      <div class="zone-action-row">
        <button id="zone-save-btn" class="action-btn accent">트렌드 존 저장</button>
        <button id="hex-deselect-btn" class="action-btn danger">전체 해제</button>
      </div>
      <div id="zone-form" style="display:none;">
        <input type="text" id="zone-name-input" placeholder="존 이름" maxlength="20" />
        <div class="color-palette" id="zone-palette"></div>
        <div class="zone-form-row">
          <input type="color" id="zone-color-input" value="#DE2F2A" />
          <button id="zone-confirm-btn" class="action-btn accent small">저장</button>
          <button id="zone-cancel-btn" class="action-btn small">취소</button>
        </div>
      </div>
    </div>

    <!-- 편집 모드 -->
    <div id="zone-edit-bar" style="display:none;">
      <span id="zone-edit-label">편집 중</span>
      <input type="color" id="zone-edit-color" class="edit-color-picker" />
      <button id="zone-edit-done" class="action-btn accent small">완료</button>
      <button id="zone-edit-cancel" class="action-btn small">취소</button>
    </div>

    <!-- 트렌드 존 목록 -->
    <div id="zone-list-area" style="display:none;">
      <h4 class="zone-list-title">📌 트렌드 존</h4>
      <div id="zone-list"></div>
      <div class="zone-io-row">
        <button id="zone-export-btn" class="action-btn small">📥 내보내기</button>
        <button id="zone-import-btn" class="action-btn small">📤 불러오기</button>
        <input type="file" id="zone-import-file" accept=".json" style="display:none" />
      </div>
    </div>

    <!-- 설정 토글 -->
    <div class="settings-toggle-row" id="settings-toggle-row">
      <button id="settings-toggle">⚙ 설정 <span class="toggle-arrow">▾</span></button>
    </div>

    <!-- 설정 패널 (좌측 내장) -->
    <div id="settings-section" style="display:none;">
      <div id="local-settings">
        <div class="settings-section">
          <h4>비선택 구역</h4>
          <div class="setting-row"><label>배경</label><button type="button" class="color-trigger" id="ct-default-fill"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
          <div class="setting-row"><label>테두리</label><button type="button" class="color-trigger" id="ct-default-stroke"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
          <div class="setting-row"><label>선 굵기</label><input type="range" id="default-stroke-weight" min="0.5" max="6" step="0.5" value="1" /><span class="range-val">1</span></div>
        </div>
        <div class="settings-section">
          <h4>선택 구역</h4>
          <div class="setting-row"><label>배경</label><button type="button" class="color-trigger" id="ct-highlight-fill"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
          <div class="setting-row"><label>테두리</label><button type="button" class="color-trigger" id="ct-highlight-stroke"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
          <div class="setting-row"><label>선 굵기</label><input type="range" id="highlight-stroke-weight" min="1" max="8" step="0.5" value="4" /><span class="range-val">4</span></div>
        </div>
        <div class="settings-section">
          <h4>경계 스무딩</h4>
          <div class="setting-row"><label>활성화</label><label class="toggle-switch"><input type="checkbox" id="smooth-toggle" /><span class="toggle-slider"></span></label></div>
          <div class="setting-row"><label>강도</label><input type="range" id="smooth-intensity" min="0" max="1" step="0.1" value="0.5" /><span class="range-val">0.5</span></div>
        </div>
        <div class="settings-section">
          <h4>선택 라벨</h4>
          <div class="setting-row"><label>표시</label><label class="toggle-switch"><input type="checkbox" id="local-label-toggle" /><span class="toggle-slider"></span></label></div>
          <div class="setting-row"><label>글자 크기</label><input type="range" id="local-label-size" min="9" max="24" step="1" value="12" /><span class="range-val">12</span></div>
          <div class="setting-row"><label>글자색</label><button type="button" class="color-trigger" id="ct-local-label-text"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
          <div class="setting-row"><label>배경</label><button type="button" class="color-trigger" id="ct-local-label-bg"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
        </div>
      </div>
      <div id="trend-settings" style="display:none;">
        <div class="settings-section">
          <h4>헥사곤 그리드</h4>
          <div class="setting-row"><label>반경</label><input type="range" id="hex-radius" min="0.3" max="3" step="0.1" value="1" /><span class="range-val" id="hex-radius-label">1.0km</span></div>
          <div class="setting-row"><label>배경</label><button type="button" class="color-trigger" id="ct-hex-fill"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
          <div class="setting-row"><label>테두리</label><button type="button" class="color-trigger" id="ct-hex-stroke"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
        </div>
        <div class="settings-section">
          <h4>선택 헥사곤</h4>
          <div class="setting-row"><label>배경</label><button type="button" class="color-trigger" id="ct-hex-sel-fill"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
        </div>
        <div class="settings-section">
          <h4>존 라벨</h4>
          <div class="setting-row"><label>글자 크기</label><input type="range" id="zone-label-size" min="9" max="24" step="1" value="11" /><span class="range-val">11</span></div>
          <div class="setting-row"><label>글자색</label><button type="button" class="color-trigger" id="ct-zone-label-text"><span class="ct-swatch"><span class="ct-fill"></span></span></button></div>
          <div class="setting-row"><label>배경 투명</label><input type="range" id="zone-label-bg-opacity" min="0" max="1" step="0.05" value="1" /><span class="range-val">1.0</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 모바일 미러 (Galaxy S25 Ultra 비율) -->
  <div id="phone-mirror">
    <div class="phone-rail">
      <button id="phone-drag" class="phone-rail-btn phone-drag" title="드래그하여 이동" aria-label="이동">⠿</button>
      <button id="phone-bigger" class="phone-rail-btn" title="크게" aria-label="크게">＋</button>
      <button id="phone-smaller" class="phone-rail-btn" title="작게" aria-label="작게">－</button>
      <button id="phone-toggle" class="phone-rail-btn phone-toggle" aria-label="모바일 미리보기 접기" title="모바일 미리보기 접기" aria-expanded="true"></button>
    </div>
    <div class="phone-frame">
      <div class="phone-screen">
        <div class="phone-notch"></div>
        <div id="phone-map" class="phone-map"></div>
        <div class="phone-topscrim">
          <div class="phone-statusbar">
            <span class="ps-time">9:41</span>
            <span class="ps-icons"><i class="ps-signal"></i><i class="ps-wifi"></i><i class="ps-batt"></i></span>
          </div>
          <div class="phone-appbar">
            <span class="pa-title">Now Here</span>
            <span class="pa-mode" id="phone-mode-chip">📍 로컬</span>
          </div>
        </div>
        <div class="phone-navbar">
          <div class="pn-group">
            <button class="pn-item active" type="button" data-nav="map">
              <span class="pn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6.2v13.8l6-2.2 6 2.2 6-2.2V4l-6 2.2L9 4Z"/><path d="M9 4v13.8M15 6.2V20"/></svg></span>
              <span class="pn-lb">지도</span>
            </button>
            <button class="pn-item" type="button" data-nav="feed">
              <span class="pn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4.5" width="16" height="6" rx="1.6"/><rect x="4" y="13.5" width="16" height="6" rx="1.6"/></svg></span>
              <span class="pn-lb">피드</span>
            </button>
            <button class="pn-item" type="button" data-nav="mission">
              <span class="pn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.4"/></svg></span>
              <span class="pn-lb">미션</span>
            </button>
            <button class="pn-item" type="button" data-nav="community">
              <span class="pn-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8.5" r="3"/><path d="M3.5 19c0-3 2.5-5.2 5.5-5.2s5.5 2.2 5.5 5.2"/><circle cx="17.2" cy="9.5" r="2.2"/><path d="M16 14.2c2.4.2 4.5 2 4.5 4.8"/></svg></span>
              <span class="pn-lb">커뮤니티</span>
            </button>
          </div>
          <button class="pn-ai" type="button" data-nav="agent" title="AI Agent" aria-label="AI Agent">
            <svg viewBox="0 0 44 44" aria-hidden="true">
              <defs>
                <radialGradient id="aiBlob" gradientUnits="userSpaceOnUse" cx="16" cy="13" r="34">
                  <stop offset="0" stop-color="#a6dbff"/>
                  <stop offset="0.5" stop-color="#5aa0ff"/>
                  <stop offset="1" stop-color="#2f7bff"/>
                </radialGradient>
              </defs>
              <g fill="url(#aiBlob)">
                <circle cx="22" cy="22" r="13.5"/>
                <circle cx="35" cy="22" r="7"/>
                <circle cx="31.2" cy="31.2" r="7"/>
                <circle cx="22" cy="35" r="7"/>
                <circle cx="12.8" cy="31.2" r="7"/>
                <circle cx="9" cy="22" r="7"/>
                <circle cx="12.8" cy="12.8" r="7"/>
                <circle cx="22" cy="9" r="7"/>
                <circle cx="31.2" cy="12.8" r="7"/>
              </g>
              <ellipse cx="17.6" cy="21" rx="2" ry="2.7" fill="#123a63"/>
              <ellipse cx="26.4" cy="21" rx="2" ry="2.7" fill="#123a63"/>
              <path d="M17.8 25.8 Q22 29.2 26.2 25.8" fill="none" stroke="#123a63" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js?v=1.1.9"></script>
  <script src="app.js?v=1.1.9"></script>
</body>
</html>
